<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two-Way Markdown Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v7.2.0/css/fontawesome.css"
    />
    <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v7.2.0/css/solid.css"
    />
    <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v7.2.0/css/brands.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/turndown@7.1.2/dist/turndown.min.js"
      defer
    ></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <a
      class="portfolio-pill"
      href="https://zenithkandel.com.np"
      target="_blank"
      rel="noopener"
      aria-label="Made by Zenith Kandel"
      ><i class="fa-solid fa-user"></i>
      <span>Zenith Kandel</span>
      <i class="fa-solid fa-arrow-up-right-from-square"></i
    ></a>

    <main>
      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <span class="label">Markdown</span>
            <div class="counts">
              <span id="wordCount">0 words</span>
              <span class="sep">·</span>
              <span id="charCount">0 chars</span>
            </div>
          </div>
          <div class="toolbar">
            <div class="tool-group">
              <button
                class="tool-btn"
                id="undoBtn"
                title="Undo (Ctrl+Z)"
                aria-label="Undo"
                disabled
              >
                <i class="fa-solid fa-rotate-left"></i>
              </button>
              <button
                class="tool-btn"
                id="redoBtn"
                title="Redo (Ctrl+Shift+Z)"
                aria-label="Redo"
                disabled
              >
                <i class="fa-solid fa-rotate-right"></i>
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button
                class="tool-btn"
                data-format="h1"
                title="Heading 1"
                aria-label="Heading 1"
              >
                <i class="fa-solid fa-heading"></i> 1
              </button>
              <button
                class="tool-btn"
                data-format="h2"
                title="Heading 2"
                aria-label="Heading 2"
              >
                <i class="fa-solid fa-heading"></i> 2
              </button>
              <button
                class="tool-btn"
                data-format="h3"
                title="Heading 3"
                aria-label="Heading 3"
              >
                <i class="fa-solid fa-heading"></i> 3
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button
                class="tool-btn"
                data-format="bold"
                title="Bold (Ctrl+B)"
                aria-label="Bold"
              >
                <i class="fa-solid fa-bold"></i>
              </button>
              <button
                class="tool-btn"
                data-format="italic"
                title="Italic (Ctrl+I)"
                aria-label="Italic"
              >
                <i class="fa-solid fa-italic"></i>
              </button>
              <button
                class="tool-btn"
                data-format="underline"
                title="Underline (Ctrl+U)"
                aria-label="Underline"
              >
                <i class="fa-solid fa-underline"></i>
              </button>
              <button
                class="tool-btn"
                data-format="strike"
                title="Strikethrough"
                aria-label="Strikethrough"
              >
                <i class="fa-solid fa-strikethrough"></i>
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button
                class="tool-btn"
                data-format="link"
                title="Link (Ctrl+K)"
                aria-label="Link"
              >
                <i class="fa-solid fa-link"></i>
              </button>
              <button
                class="tool-btn"
                data-format="image"
                title="Image"
                aria-label="Image"
              >
                <i class="fa-solid fa-image"></i>
              </button>
              <button
                class="tool-btn"
                data-format="code"
                title="Inline code (Ctrl+`)"
                aria-label="Inline code"
              >
                <i class="fa-solid fa-code"></i>
              </button>
              <button
                class="tool-btn"
                data-format="codeblock"
                title="Code block"
                aria-label="Code block"
              >
                <i class="fa-solid fa-rectangle-code"></i>
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button
                class="tool-btn"
                data-format="list"
                title="Bullet list"
                aria-label="Bullet list"
              >
                <i class="fa-solid fa-list-ul"></i>
              </button>
              <button
                class="tool-btn"
                data-format="olist"
                title="Numbered list"
                aria-label="Numbered list"
              >
                <i class="fa-solid fa-list-ol"></i>
              </button>
              <button
                class="tool-btn"
                data-format="quote"
                title="Blockquote"
                aria-label="Blockquote"
              >
                <i class="fa-solid fa-quote-left"></i>
              </button>
              <button
                class="tool-btn"
                data-format="table"
                title="Table"
                aria-label="Table"
              >
                <i class="fa-solid fa-table"></i>
              </button>
              <button
                class="tool-btn"
                data-format="hr"
                title="Horizontal rule"
                aria-label="Horizontal rule"
              >
                <i class="fa-solid fa-horizontal-rule"></i>
              </button>
            </div>
          </div>
          <textarea
            id="markdownInput"
            class="editor"
            spellcheck="false"
            aria-label="Markdown input"
            placeholder="Start writing markdown…"
          ></textarea>
        </article>

        <article class="pane">
          <div class="pane-header">
            <span class="label">Preview</span>
            <span class="badge">Two-Way</span>
          </div>
          <div class="toolbar preview-toolbar">
            <span class="hint">Editable — changes sync back to markdown</span>
          </div>
          <div
            id="preview"
            class="preview"
            contenteditable="true"
            aria-label="Rendered preview — editable"
          ></div>
        </article>
      </section>

      <section class="actions">
        <input
          type="file"
          id="filePicker"
          accept=".md,.markdown,.txt"
          style="display: none"
        />
        <button
          class="ghost"
          id="loadFileBtn"
          title="Load markdown"
          aria-label="Load markdown"
        >
          <i class="fa-solid fa-folder-open"></i
          ><span class="sr-only">Load .md</span>
        </button>
        <button
          class="ghost"
          id="exportMdBtn"
          title="Export markdown"
          aria-label="Export markdown"
        >
          <i class="fa-solid fa-file-arrow-down"></i
          ><span class="sr-only">Export .md</span>
        </button>
        <button
          class="ghost"
          id="exportPdfBtn"
          title="Export PDF"
          aria-label="Export PDF"
        >
          <i class="fa-solid fa-file-pdf"></i
          ><span class="sr-only">Export PDF</span>
        </button>
        <button
          class="ghost"
          id="resetSample"
          title="Load sample"
          aria-label="Load sample"
        >
          <i class="fa-solid fa-sparkles"></i
          ><span class="sr-only">Sample</span>
        </button>
        <button
          class="ghost"
          id="clearAll"
          title="Clear all"
          aria-label="Clear all"
        >
          <i class="fa-solid fa-trash"></i><span class="sr-only">Clear</span>
        </button>
        <button
          class="ghost"
          id="saveNow"
          title="Save now"
          aria-label="Save now"
        >
          <i class="fa-solid fa-floppy-disk"></i
          ><span class="sr-only">Save</span>
        </button>
        <span class="status" id="status">Ready</span>
      </section>
    </main>
  </body>
</html>
