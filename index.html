<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two-Way Markdown Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/turndown@7.1.2/dist/turndown.min.js"
      defer
    ></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <a
      class="portfolio-pill"
      href="https://zenithkandel.com.np"
      target="_blank"
      rel="noopener"
      aria-label="Made by Zenith Kandel"
      >Made by Zenith Kandel</a
    >

    <main>
      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <span class="label">Markdown Source</span>
            <span class="badge">Live Edit</span>
          </div>
          <div class="toolbar">
            <button class="tool-btn" data-format="bold">Bold</button>
            <button class="tool-btn" data-format="italic">Italic</button>
            <button class="tool-btn" data-format="underline">Underline</button>
            <button class="tool-btn" data-format="link">Link</button>
            <button class="tool-btn" data-format="list">List</button>
            <button class="tool-btn" data-format="quote">Quote</button>
            <button class="tool-btn" data-format="code">Code</button>
            <button class="tool-btn" data-format="table">Table</button>
            <button class="tool-btn" data-format="image">Image</button>
          </div>
          <textarea
            id="markdownInput"
            class="editor"
            spellcheck="false"
            aria-label="Markdown input"
          ></textarea>
        </article>

        <article class="pane">
          <div class="pane-header">
            <span class="label">Rendered Output</span>
            <span class="badge">Two-Way</span>
          </div>
          <div class="toolbar">
            <span class="hint"
              >Click and edit this preview. Changes mirror back to
              markdown.</span
            >
          </div>
          <div
            id="preview"
            class="preview"
            contenteditable="true"
            aria-label="Preview output"
          ></div>
        </article>
      </section>

      <section class="actions">
        <input
          type="file"
          id="filePicker"
          accept=".md,.markdown,.txt"
          style="display: none"
        />
        <button class="ghost" id="resetSample">Reset to sample</button>
        <button class="ghost" id="clearAll">Clear</button>
        <button class="ghost" id="saveNow">Save now</button>
        <span class="status" id="status">Idle</span>
      </section>
    </main>
  </body>
</html>
