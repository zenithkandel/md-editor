<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two-Way Markdown Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/turndown@7.1.2/dist/turndown.min.js"
      defer
    ></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <a
      class="portfolio-pill"
      href="https://zenithkandel.com.np"
      target="_blank"
      rel="noopener"
      aria-label="Made by Zenith Kandel"
      >Made by Zenith Kandel</a
    >

    <main>
      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <span class="label">Markdown</span>
            <div class="counts">
              <span id="wordCount">0 words</span>
              <span class="sep">·</span>
              <span id="charCount">0 chars</span>
            </div>
          </div>
          <div class="toolbar">
            <div class="tool-group">
              <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>&#8630;</button>
              <button class="tool-btn" id="redoBtn" title="Redo (Ctrl+Shift+Z)" disabled>&#8631;</button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button class="tool-btn" data-format="h1" title="Heading 1">
                H1
              </button>
              <button class="tool-btn" data-format="h2" title="Heading 2">
                H2
              </button>
              <button class="tool-btn" data-format="h3" title="Heading 3">
                H3
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button class="tool-btn" data-format="bold" title="Bold (Ctrl+B)">
                <b>B</b>
              </button>
              <button
                class="tool-btn"
                data-format="italic"
                title="Italic (Ctrl+I)"
              >
                <i>I</i>
              </button>
              <button
                class="tool-btn"
                data-format="underline"
                title="Underline (Ctrl+U)"
              >
                <u>U</u>
              </button>
              <button
                class="tool-btn"
                data-format="strike"
                title="Strikethrough"
              >
                <s>S</s>
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button class="tool-btn" data-format="link" title="Link (Ctrl+K)">
                Link
              </button>
              <button class="tool-btn" data-format="image" title="Image">
                Img
              </button>
              <button
                class="tool-btn"
                data-format="code"
                title="Inline code (Ctrl+`)"
              >
                Code
              </button>
              <button
                class="tool-btn"
                data-format="codeblock"
                title="Code block"
              >
                ```
              </button>
            </div>
            <div class="tool-sep"></div>
            <div class="tool-group">
              <button class="tool-btn" data-format="list" title="Bullet list">
                • List
              </button>
              <button
                class="tool-btn"
                data-format="olist"
                title="Numbered list"
              >
                1. List
              </button>
              <button class="tool-btn" data-format="quote" title="Blockquote">
                Quote
              </button>
              <button class="tool-btn" data-format="table" title="Table">
                Table
              </button>
              <button class="tool-btn" data-format="hr" title="Horizontal rule">
                HR
              </button>
            </div>
          </div>
          <textarea
            id="markdownInput"
            class="editor"
            spellcheck="false"
            aria-label="Markdown input"
            placeholder="Start writing markdown…"
          ></textarea>
        </article>

        <article class="pane">
          <div class="pane-header">
            <span class="label">Preview</span>
            <span class="badge">Two-Way</span>
          </div>
          <div class="toolbar preview-toolbar">
            <span class="hint">Editable — changes sync back to markdown</span>
          </div>
          <div
            id="preview"
            class="preview"
            contenteditable="true"
            aria-label="Rendered preview — editable"
          ></div>
        </article>
      </section>

      <section class="actions">
        <input
          type="file"
          id="filePicker"
          accept=".md,.markdown,.txt"
          style="display: none"
        />
        <button class="ghost" id="loadFileBtn">Load .md</button>
        <button class="ghost" id="exportMdBtn">Export .md</button>
        <button class="ghost" id="exportPdfBtn">Export PDF</button>
        <button class="ghost" id="resetSample">Sample</button>
        <button class="ghost" id="clearAll">Clear</button>
        <button class="ghost" id="saveNow">Save</button>
        <span class="status" id="status">Ready</span>
      </section>
    </main>
  </body>
</html>
